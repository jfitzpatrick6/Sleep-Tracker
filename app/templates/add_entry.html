{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Log Sleep Entry</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="sleep_date" class="form-label">Sleep Date</label>
                        <input type="date" 
                               class="form-control" 
                               id="sleep_date" 
                               name="sleep_date" 
                               value="{{ today }}" 
                               required>
                    </div>

                    <div class="mb-3">
                        <label for="hours_slept" class="form-label">Hours Slept</label>
                        <input type="number" 
                               class="form-control" 
                               id="hours_slept" 
                               name="hours_slept" 
                               step="0.1" 
                               min="0" 
                               max="24" 
                               placeholder="7.5" 
                               required>
                    </div>

                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes (optional)</label>
                        <textarea class="form-control" 
                                  id="notes" 
                                  name="notes" 
                                  rows="3" 
                                  placeholder="Fell asleep at 11pm, woke up at 7am..."></textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Save Sleep Entry</button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-muted text-center">
                <small>Tip: You can edit an existing entry by logging the same date again.</small>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">← Back to Dashboard</a>
        </div>
    </div>
</div>

<script>
// Set today's date by default
document.addEventListener('DOMContentLoaded', function() {
    const dateInput = document.getElementById('sleep_date');
    if (!dateInput.value) {
        const today = new Date().toISOString().split('T')[0];
        dateInput.value = today;
    }
});
</script>
{% endblock %}
